<!doctype html>
<html amp lang="id">
<head>
  <meta charset="utf-8">
  <script async src="https://cdn.ampproject.org/v0.js"></script>
  <link rel="icon" href="1.png" type="image/webp">
  <title>KANCAH4D</title>
  <link rel="canonical" href="https://domain-anda.com/">
  <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1">
  
  <style amp-boilerplate>body{-webkit-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-moz-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-ms-animation:-amp-start 8s steps(1,end) 0s 1 normal both;animation:-amp-start 8s steps(1,end) 0s 1 normal both}@-webkit-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-moz-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-ms-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-o-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}</style><noscript><style amp-boilerplate>body{-webkit-animation:none;-moz-animation:none;-ms-animation:none;animation:none}</style></noscript>
  
  <style amp-custom>
    body {
      background-color: #0b0b0b;
      /* Efek background bintik-bintik (dotted) seperti di gambar */
      background-image: radial-gradient(#2a2a2a 1px, transparent 1px);
      background-size: 6px 6px;
      color: #ffffff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 480px; /* Dioptimalkan untuk tampilan HP */
      margin: 0 auto;
      padding: 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .logo-area {
      margin-top: 10px;
      margin-bottom: 15px;
    }
    /* Anda bisa mengganti teks ini dengan tag <amp-img> jika punya logo PNG */
    .logo-text {
      color: #ffd700;
      font-size: 38px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 0;
      text-shadow: 0 0 15px rgba(255, 215, 0, 0.4); 
    }
    .subtext {
      font-size: 11px;
      color: #dddddd;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }
    .hero-image {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 25px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.9);
      border: 1px solid #333;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 900;
      font-size: 18px;
      text-align: center;
      box-sizing: border-box;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    /* Tombol Kuning / Emas */
    .btn-login {
      background: linear-gradient(to bottom, #ffc800, #b38800);
      color: #000;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.4), 0 4px 8px rgba(0,0,0,0.6);
      border: 1px solid #8c6a00;
    }
    /* Tombol Merah */
    .btn-register {
      background: linear-gradient(to bottom, #ff0000, #990000);
      color: #fff;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.3), 0 4px 8px rgba(0,0,0,0.6);
      border: 1px solid #660000;
    }
    .footer {
      margin-top: auto;
      padding: 20px 0 10px 0;
      font-size: 11px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="container">
    
<div class="logo-area">
      <amp-img 
        src="kancah.webp" 
        alt="Logo Website" 
        width="250" 
        height="60" 
        layout="intrinsic">
      </amp-img>
    </div>
    
    <div class="subtext">
      KANCAH4D - link alternatif SGA No 1 resmi spesial akses login & daftar akun cepat, mudah, dan aman
    </div>

    <div class="hero-image">
      <amp-img 
        src="kancah4d.webp" 
        alt="Banner Promosi" 
        width="800" 
        height="800" 
        layout="responsive">
      </amp-img>
    </div>

    <a href="https://kancah4d.com/" class="btn btn-login">LOGIN</a>
    <a href="https://kancah4d.com/" class="btn btn-register">DAFTAR</a>

    <div class="footer">
      © 2026 • SEO BY DUGINO • All Rights Reserved.
    </div>

  </div>
</body>
</html>
